<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agendamentos – Flávia Franco</title>
<link rel="stylesheet" href="style/style.css"/>
<link rel="stylesheet" href="style/agendamentos.css"/>
</head>
<body>
<div class="admin-app">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo">F|</div>
    <nav class="admin-sidebar__nav">
      <a class="admin-nav-item active" href="agendamentos.html" title="Agendamentos">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10.5" width="18" height="3" rx="1"/><rect x="3" y="17" width="18" height="3" rx="1"/></svg>
      </a>
      <a class="admin-nav-item" href="grafico.html" title="Gráficos">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </a>
      <a class="admin-nav-item" href="home.html" title="Ver site">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a class="admin-nav-item" href="#" title="Sair" onclick="sair()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-header">
      <span class="admin-header__title">Agendamentos</span>
      <div class="admin-header__right">
        <span class="admin-header__nome" id="nomeAdmin"></span>
        <div class="admin-header__avatar">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-toolbar">
          <div class="admin-toolbar__group">
            <label>Nome</label>
            <input type="text" id="filterNome" placeholder="" oninput="filtrarLocal()"/>
          </div>
          <div class="admin-toolbar__group">
            <label>Status</label>
            <select id="filterStatus" onchange="carregarAgendamentos()">
              <option value="">Todos</option>
              <option value="pendente">Pendente</option>
              <option value="confirmado">Confirmado</option>
              <option value="concluido">Concluído</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
          <button class="admin-btn-new" onclick="openModal()">+ Novo horário</button>
        </div>
        <div class="admin-table-wrap" id="tableWrap">
          <p class="admin-estado">Carregando...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="admin-modal-backdrop" id="modalBackdrop">
  <div class="admin-modal">
    <div class="admin-modal__title">Criar horários disponíveis</div>
    <div class="admin-modal__field"><label>SERVIÇO</label><select id="mServico"></select></div>
    <div class="admin-modal__field"><label>DATA</label><input type="date" id="mData"/></div>
    <div class="admin-modal__field"><label>HORÁRIOS (separados por vírgula)</label><input type="text" id="mSlots" placeholder="08:00, 09:00, 10:00"/></div>
    <p class="admin-modal__erro" id="modalErro"></p>
    <div class="admin-modal__actions">
      <button class="admin-modal__btn admin-modal__btn--cancel" onclick="closeModal()">Cancelar</button>
      <button class="admin-modal__btn admin-modal__btn--save" id="btnSalvar" onclick="salvarHorarios()">Criar</button>
    </div>
  </div>
</div>

<script>
const API_URL = "http://localhost:3000/api";
if (!localStorage.getItem("token_admin")) window.location.href = "login.html";
document.getElementById("nomeAdmin").textContent = localStorage.getItem("admin_nome") || "";
let todosAgendamentos = [];

async function apiFetch(path, options={}) {
  const token = localStorage.getItem("token_admin");
  const headers = {"Content-Type":"application/json"};
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res  = await fetch(`${API_URL}${path}`, {...options, headers});
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro||"Erro");
  return data;
}

function fmt(d) { return d ? new Date(d).toLocaleDateString("pt-BR") : ""; }

function filtrarLocal() {
  const f = document.getElementById("filterNome").value.toLowerCase();
  renderRows(todosAgendamentos.filter(a => a.paciente_nome.toLowerCase().includes(f)));
}

function renderRows(lista) {
  const wrap = document.getElementById("tableWrap");
  if (!lista.length) { wrap.innerHTML='<p class="admin-estado">Nenhum agendamento encontrado.</p>'; return; }
  wrap.innerHTML = "";
  lista.forEach((a,i) => {
    const h = a.horario_id||{}, s = h.servico_id||{};
    const status = a.status||"pendente";
    const fill = {pendente:55,confirmado:75,concluido:95,cancelado:40}[status]||55;
    const row = document.createElement("div");
    row.className="admin-row"; row.style.animationDelay=`${i*25}ms`;
    row.innerHTML=`
      <div class="admin-row__bar">
        <div class="admin-row__fill ${status}" style="width:${fill}%"></div>
        <span class="admin-row__text">${a.paciente_nome} · ${fmt(h.data)} ${h.hora_inicio||""} · ${s.nome||"—"} <span class="admin-badge ${status}">${status}</span></span>
      </div>
      <div class="admin-row__actions">
        ${status==="pendente"?`<button class="admin-row__btn" onclick="mudarStatus('${a._id}','confirmado')" title="Confirmar"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>`:""}
        ${["pendente","confirmado"].includes(status)?`<button class="admin-row__btn danger" onclick="mudarStatus('${a._id}','cancelado')" title="Cancelar"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`:""}
      </div>`;
    wrap.appendChild(row);
  });
}

async function carregarAgendamentos() {
  const status = document.getElementById("filterStatus").value;
  document.getElementById("tableWrap").innerHTML='<p class="admin-estado">Carregando...</p>';
  try {
    todosAgendamentos = await apiFetch(`/admin/agendamentos${status?`?status=${status}`:""}`);
    filtrarLocal();
  } catch(err) {
    if(err.message.includes("Token")) sair();
    else document.getElementById("tableWrap").innerHTML='<p class="admin-estado">Erro ao carregar. Servidor está rodando?</p>';
  }
}

async function mudarStatus(id,status) {
  try { await apiFetch(`/admin/agendamentos/${id}`,{method:"PATCH",body:JSON.stringify({status})}); await carregarAgendamentos(); }
  catch(err) { alert("Erro: "+err.message); }
}

async function openModal() {
  document.getElementById("modalBackdrop").classList.add("open");
  try {
    const servicos = await apiFetch("/servicos");
    document.getElementById("mServico").innerHTML = servicos.map(s=>`<option value="${s._id}" data-dur="${s.duracao_min}">${s.nome}</option>`).join("");
  } catch{}
}

function closeModal() { document.getElementById("modalBackdrop").classList.remove("open"); }

async function salvarHorarios() {
  const el=document.getElementById("mServico"), sid=el.value, dur=parseInt(el.selectedOptions[0]?.dataset.dur||60);
  const data=document.getElementById("mData").value;
  const slots=document.getElementById("mSlots").value.split(",").map(s=>s.trim()).filter(Boolean);
  const erro=document.getElementById("modalErro"), btn=document.getElementById("btnSalvar");
  if(!data||!slots.length){erro.textContent="Preencha data e horários.";erro.style.display="block";return;}
  btn.disabled=true; btn.textContent="Criando..."; erro.style.display="none";
  try { const r=await apiFetch("/admin/horarios",{method:"POST",body:JSON.stringify({servico_id:sid,data,slots,duracao_min:dur})}); alert(r.mensagem); closeModal(); }
  catch(err){erro.textContent=err.message;erro.style.display="block";}
  finally{btn.disabled=false;btn.textContent="Criar";}
}

function sair() { localStorage.removeItem("token_admin"); localStorage.removeItem("admin_nome"); window.location.href="login.html"; }
document.getElementById("modalBackdrop").addEventListener("click",function(e){if(e.target===this)closeModal();});
carregarAgendamentos();
</script>
</body>
</html>
