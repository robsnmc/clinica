<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flávia Franco – Saúde Regenerativa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #dcdbd6;
      --taupe: #b5a594;
      --card-bg: #b5a594;
      --text-light: #f5f2ee;
      --input-bg: #ffffff;
      --label: #f0ece6;
      --btn-bg: #ffffff;
      --btn-text: #6b5e52;
      --link: #f0ece6;
    }

    html, body {
      height: 100%;
      font-family: 'Raleway', sans-serif;
    }

    body {
      background: var(--bg);
    }

    /* ── Page ────────────────────────────────────────── */
    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Organic blobs ───────────────────────────────── */
    .blob {
      position: absolute;
      background: var(--taupe);
      opacity: 0.92;
      z-index: 0;
    }

    /* Bottom-left blob */
    .blob--bl {
      width: 540px;
      height: 460px;
      bottom: -130px;
      left: -110px;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    }

    /* Top-right blob */
    .blob--tr {
      width: 500px;
      height: 520px;
      top: -140px;
      right: -100px;
      border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%;
    }

    /* Top-left blob — new */
    .blob--tl {
      width: 280px;
      height: 310px;
      top: -90px;
      left: -70px;
      border-radius: 48% 52% 62% 38% / 42% 58% 42% 58%;
    }

    /* ── Brand (top-left) ────────────────────────────── */
    .brand {
      position: absolute;
      top: 40px;
      left: 52px;
      z-index: 10;
    }
    .brand__name {
      font-family: 'Raleway', sans-serif;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: #5a4e44;
      text-transform: uppercase;
    }
    .brand__sub {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: #8a7a6e;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* ── Login card ──────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      background: var(--card-bg);
      border-radius: 4px;
      padding: 42px 40px 36px;
      width: 100%;
      max-width: 290px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text-light);
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
    }

    /* ── Form fields ─────────────────────────────────── */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--label);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      height: 34px;
      background: var(--input-bg);
      border: none;
      border-radius: 3px;
      padding: 0 10px;
      font-family: 'Raleway', sans-serif;
      font-size: 13px;
      color: #5a4e44;
      outline: none;
      transition: box-shadow 0.2s;
    }

    .field input:focus {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.45);
    }

    /* ── Links ───────────────────────────────────────── */
    .links {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 22px;
    }

    .links a {
      display: block;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--link);
      text-decoration: none;
      line-height: 1.9;
      transition: opacity 0.2s;
    }

    .links a:hover {
      opacity: 0.75;
    }

    /* ── Button ──────────────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      height: 36px;
      background: var(--btn-bg);
      border: none;
      border-radius: 3px;
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--btn-text);
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      background: #f0ece6;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
    }

    .btn:active {
      background: #e5dfd8;
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- Blobs -->
    <div class="blob blob--tl"></div>
    <div class="blob blob--bl"></div>
    <div class="blob blob--tr"></div>

    <!-- Brand -->
    <div class="brand">
      <div class="brand__name">Flávia Franco</div>
      <div class="brand__sub">Saúde Regenerativa</div>
    </div>

    <!-- Card -->
    <div class="card">
      <h1 class="card__title">Acessar conta</h1>

      <div class="field">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" autocomplete="current-password"/>
      </div>

      <div class="links">
        <a href="#">esqueceu sua senha?</a>
        <a href="#">não possui conta</a>
      </div>

      <button class="btn" type="button">Entrar</button>
    </div>

  </div>

</body>
</html>
