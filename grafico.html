<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Flávia Franco</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --sidebar-bg: #b5a594;
      --sidebar-w: 56px;
      --taupe: #b5a594;
      --taupe-dark: #9e8e7e;
      --bar-color: #a08d7a;
      --text-main: #3a3028;
      --text-muted: #9e8e7e;
      --grid-line: #e0dbd4;
      --white: #ffffff;
      --header-h: 56px;
    }

    html, body { height: 100%; font-family: 'Raleway', sans-serif; background: var(--bg); }

    /* ── Layout ── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 24px;
      flex-shrink: 0;
      z-index: 10;
    }

    .sidebar__logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.02em;
      margin-bottom: 32px;
      line-height: 1;
      text-align: center;
      padding: 0 6px;
    }

    .sidebar__nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      align-items: center;
    }

    .nav-item {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.18s;
      color: rgba(255,255,255,0.75);
    }

    .nav-item:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.25); color: #fff; }

    .nav-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--white);
    }

    /* ── Header ── */
    .header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--grid-line);
      flex-shrink: 0;
    }

    .header__title {
      font-family: 'Raleway', sans-serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text-main);
      letter-spacing: 0.02em;
    }

    .header__avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--grid-line);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.18s;
    }
    .header__avatar:hover { background: #ccc9c2; }
    .header__avatar svg { width: 18px; height: 18px; stroke: var(--text-muted); fill: none; stroke-width: 1.6; }

    /* ── Chart area ── */
    .chart-wrap {
      flex: 1;
      padding: 28px 32px 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chart-container {
      flex: 1;
      position: relative;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo">F|</div>
    <nav class="sidebar__nav">
      <!-- Chart icon (active) -->
      <div class="nav-item active" title="Dashboard">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <!-- List icon -->
      <div class="nav-item" title="Agendamentos">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10.5" width="18" height="3" rx="1"/><rect x="3" y="17" width="18" height="3" rx="1"/></svg>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <span class="header__title">Dashboard agendamentos</span>
      <div class="header__avatar">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </header>

    <div class="chart-wrap">
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  const labels = ['Jan.', 'Fev.', 'Mar.', 'Mai.', 'Jun', 'Jul.', '1pm', '8pm', '5pm', '7pm', '9pm', '11pm', ''];
  const data   = [7, 20, 7, 48, 30, 10, 15, 29, 23, 10, 48, 33, 7];

  const barColor = '#a08d7a';

  new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: barColor,
        borderRadius: 2,
        borderSkipped: 'bottom',
        barPercentage: 0.55,
        categoryPercentage: 0.7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 900,
        easing: 'easeOutQuart',
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          titleColor: '#3a3028',
          bodyColor: '#9e8e7e',
          borderColor: '#e0dbd4',
          borderWidth: 1,
          padding: 10,
          titleFont: { family: 'Raleway', size: 12, weight: '500' },
          bodyFont:  { family: 'Raleway', size: 12 },
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} agendamentos`
          }
        }
      },
      scales: {
        x: {
          grid: {
            color: '#e0dbd4',
            lineWidth: 1,
          },
          border: { display: false },
          ticks: {
            color: '#9e8e7e',
            font: { family: 'Raleway', size: 11 },
          }
        },
        y: {
          position: 'left',
          grid: {
            color: '#e0dbd4',
            lineWidth: 1,
          },
          border: { display: false },
          ticks: {
            color: '#9e8e7e',
            font: { family: 'Raleway', size: 11 },
            stepSize: 10,
          },
          min: 0,
        },
        y2: {
          position: 'right',
          grid: { drawOnChartArea: false },
          border: { display: false },
          ticks: {
            color: '#9e8e7e',
            font: { family: 'Raleway', size: 11 },
            stepSize: 20,
            callback: v => v,
          },
          min: 0,
          max: 100,
        }
      }
    }
  });
</script>
</body>
</html>
