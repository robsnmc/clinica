<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard – Flávia Franco</title>
<link rel="stylesheet" href="style/style.css"/>
<link rel="stylesheet" href="style/agendamentos.css"/>
</head>
<body>
<div class="admin-app">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo">F|</div>
    <nav class="admin-sidebar__nav">
      <a class="admin-nav-item" href="agendamentos.html" title="Agendamentos">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10.5" width="18" height="3" rx="1"/><rect x="3" y="17" width="18" height="3" rx="1"/></svg>
      </a>
      <a class="admin-nav-item active" href="grafico.html" title="Dashboard">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </a>
      <a class="admin-nav-item" href="home.html" title="Ver site">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a class="admin-nav-item" href="#" title="Sair" onclick="sair()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <span class="admin-header__title">Dashboard</span>
      <div class="admin-header__right">
        <span class="admin-header__nome" id="nomeAdmin"></span>
        <div class="admin-header__avatar">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <!-- Cards resumo -->
      <div class="dash-cards" id="dashCards">
        <div class="dash-card"><div class="dash-card__num" id="dTotal">—</div><div class="dash-card__label">Total Agendamentos</div></div>
        <div class="dash-card dash-card--yellow"><div class="dash-card__num" id="dPendentes">—</div><div class="dash-card__label">Pendentes</div></div>
        <div class="dash-card dash-card--green"><div class="dash-card__num" id="dConfirmados">—</div><div class="dash-card__label">Confirmados</div></div>
        <div class="dash-card dash-card--blue"><div class="dash-card__num" id="dHoje">—</div><div class="dash-card__label">Agendados Hoje</div></div>
      </div>

      <!-- Gráfico de barras -->
      <div class="admin-card" style="margin-top:20px; padding:28px;">
        <h3 style="font-family:var(--serif,serif);font-size:18px;font-weight:400;margin-bottom:24px;color:#3a3028">Agendamentos por status</h3>
        <canvas id="graficoBar" height="120"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_URL = "http://localhost:3000/api";
if (!localStorage.getItem("token_admin")) window.location.href = "login.html";
document.getElementById("nomeAdmin").textContent = localStorage.getItem("admin_nome")||"";

async function apiFetch(path) {
  const token = localStorage.getItem("token_admin");
  const res = await fetch(`${API_URL}${path}`, {headers:{"Authorization":`Bearer ${token}`}});
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro||"Erro");
  return data;
}

async function carregarDashboard() {
  try {
    const d = await apiFetch("/admin/dashboard");
    document.getElementById("dTotal").textContent      = d.total||0;
    document.getElementById("dPendentes").textContent  = d.pendentes||0;
    document.getElementById("dConfirmados").textContent= d.confirmados||0;
    document.getElementById("dHoje").textContent       = d.agendadosHoje||0;

    new Chart(document.getElementById("graficoBar"), {
      type: "bar",
      data: {
        labels: ["Total","Pendentes","Confirmados","Hoje","Contatos s/ resp."],
        datasets: [{
          data: [d.total||0, d.pendentes||0, d.confirmados||0, d.agendadosHoje||0, d.contatosNaoRespondidos||0],
          backgroundColor: ["#b5a594","#e8c97a","#85b89a","#8fb3c8","#cc8888"],
          borderRadius: 6, borderSkipped: false,
        }]
      },
      options: {
        plugins: { legend: { display:false } },
        scales: { y: { beginAtZero:true, ticks:{ stepSize:1 } } }
      }
    });
  } catch(err) {
    if(err.message.includes("Token")) sair();
  }
}

function sair() { localStorage.removeItem("token_admin"); localStorage.removeItem("admin_nome"); window.location.href="login.html"; }
carregarDashboard();
</script>
</body>
</html>
